<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desktop EAS</title>
    <style>body{opacity:0;background:#1a1a2e}</style>
    <script type="module" crossorigin src="./assets/index-BrxCoI4M.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/leaflet-BlAy2-mF.js">
    <link rel="stylesheet" crossorigin href="./assets/leaflet-DvTUgzRd.css">
    <link rel="stylesheet" crossorigin href="./assets/index-CbWg9-b2.css">
  </head>
  <body>
    <div id="setup-overlay" class="hidden">
      <div class="setup-container">
        <h1 class="setup-title">Welcome to Desktop EAS</h1>
        <p class="setup-subtitle">Set your location to receive relevant emergency alerts for your area.</p>
        <div class="setup-search-wrap">
          <input
            type="text"
            id="setup-location-input"
            class="setup-input"
            placeholder="Search city, county, or state..."
            autocomplete="off"
          />
          <div id="setup-location-results" class="location-results hidden"></div>
        </div>
        <div id="setup-selected" class="hidden">
          <div class="setup-selected-location">
            <span class="location-pin">&#9679;</span>
            <span id="setup-selected-name"></span>
          </div>
          <button id="setup-continue" class="setup-continue-btn">Continue</button>
        </div>
        <button id="setup-skip" class="setup-skip-btn">Skip for now</button>
      </div>
    </div>
    <div id="app">
      <header id="header">
        <div id="header-left">
          <h1>Desktop EAS</h1>
          <nav id="tabs">
            <button class="tab active" data-tab="alerts">Alerts</button>
            <button class="tab" data-tab="settings">Settings</button>
          </nav>
        </div>
        <div id="status">Waiting for alerts...</div>
      </header>
      <main id="alert-list"></main>
      <section id="settings-view" class="hidden"></section>
      <div id="alert-detail" class="hidden"></div>
    </div>
  </body>
</html>
